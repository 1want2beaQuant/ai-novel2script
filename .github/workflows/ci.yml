name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: Smoke test module entrypoint
        run: python -m novel2script --version

      - name: Smoke test YAML CLI
        run: novel2script examples/three_chapters.txt --output outputs/ci-smoke.yaml --validate

      - name: Smoke test Fountain CLI
        run: novel2script examples/three_chapters.txt --format fountain --output outputs/ci-smoke.fountain

      - name: Verify schema copies match
        run: cmp schemas/script.schema.json src/novel2script/schemas/script.schema.json

  build:
    name: Build package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install release tools
        run: python -m pip install -e ".[release]"

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Install wheel in clean environment
        run: |
          python -m venv .venv-wheel
          .venv-wheel/bin/python -m pip install --upgrade pip
          .venv-wheel/bin/python -m pip install dist/*.whl

      - name: Smoke test installed wheel
        run: |
          .venv-wheel/bin/novel2script --version
          .venv-wheel/bin/python -m novel2script --version
          .venv-wheel/bin/novel2script examples/three_chapters.txt --output outputs/wheel-smoke.yaml --validate
          .venv-wheel/bin/novel2script examples/three_chapters.txt --format fountain --output outputs/wheel-smoke.fountain

      - name: Install sdist in clean environment
        run: |
          python -m venv .venv-sdist
          .venv-sdist/bin/python -m pip install --upgrade pip
          .venv-sdist/bin/python -m pip install dist/*.tar.gz

      - name: Smoke test installed sdist
        run: |
          .venv-sdist/bin/novel2script --version
          .venv-sdist/bin/python -m novel2script --version
          .venv-sdist/bin/novel2script examples/three_chapters.txt --output outputs/sdist-smoke.yaml --validate
          .venv-sdist/bin/novel2script examples/three_chapters.txt --format fountain --output outputs/sdist-smoke.fountain

  windows-smoke:
    name: Windows smoke
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Test
        run: python -m pytest

      - name: Smoke test console entrypoint
        run: novel2script --version

      - name: Smoke test module entrypoint
        run: python -m novel2script --version

      - name: Smoke test YAML CLI
        run: novel2script examples\three_chapters.txt --output outputs\windows-smoke.yaml --validate

      - name: Smoke test Fountain CLI
        run: novel2script examples\three_chapters.txt --format fountain --output outputs\windows-smoke.fountain

      - name: Verify schema copies match
        run: cmd /c fc /b schemas\script.schema.json src\novel2script\schemas\script.schema.json

  security:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Upgrade installer tooling
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install audit tools
        run: python -m pip install -e ".[dev,release,security]"

      - name: Audit Python dependencies
        run: python -m pip_audit --skip-editable
