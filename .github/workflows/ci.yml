name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: Smoke test YAML CLI
        run: novel2script examples/three_chapters.txt --output outputs/ci-smoke.yaml --validate

      - name: Smoke test Fountain CLI
        run: novel2script examples/three_chapters.txt --format fountain --output outputs/ci-smoke.fountain

      - name: Verify schema copies match
        run: cmp schemas/script.schema.json src/novel2script/schemas/script.schema.json
