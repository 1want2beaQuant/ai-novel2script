name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  test:
    name: Test release candidate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Upgrade installer tooling
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install package
        run: python -m pip install -e ".[dev,release,security]"

      - name: Verify tag matches package version
        run: python scripts/check_release_tag.py "${{ github.ref_name }}"

      - name: Audit Python dependencies
        run: python -m pip_audit --skip-editable

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: Smoke test YAML CLI
        run: novel2script examples/three_chapters.txt --output outputs/release-smoke.yaml --validate

      - name: Smoke test Fountain CLI
        run: novel2script examples/three_chapters.txt --format fountain --output outputs/release-smoke.fountain

      - name: Verify schema copies match
        run: cmp schemas/script.schema.json src/novel2script/schemas/script.schema.json

  build:
    name: Build distributions
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install release tools
        run: python -m pip install -e ".[release]"

      - name: Build package
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Install wheel in clean environment
        run: |
          python -m venv .venv-wheel
          .venv-wheel/bin/python -m pip install --upgrade pip
          .venv-wheel/bin/python -m pip install dist/*.whl

      - name: Smoke test installed wheel
        run: |
          .venv-wheel/bin/novel2script --version
          .venv-wheel/bin/novel2script examples/three_chapters.txt --output outputs/wheel-smoke.yaml --validate
          .venv-wheel/bin/novel2script examples/three_chapters.txt --format fountain --output outputs/wheel-smoke.fountain

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/novel2script
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
